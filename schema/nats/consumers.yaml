# NATS JetStream Consumers Configuration
consumers:
  # Consumer for profile identify events
  - name: "profile-identify-processor"
    stream_name: "profiles"
    durable_name: "profile-identify-processor-durable"
    filter_subject: "profiles.identify"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for profile alias events
  - name: "profile-alias-processor"
    stream_name: "profiles"
    durable_name: "profile-alias-processor-durable"
    filter_subject: "profiles.alias"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for profile upsert events -> ClickHouse
  - name: "profile-upsert-processor"
    stream_name: "profiles"
    durable_name: "profile-upsert-processor-durable"
    filter_subject: "profiles.upsert"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Compliance worker — GDPR/DPDP erasure (export + retention join here later).
  # Heavy, slow ClickHouse mutations run here off the request path; the worker uses
  # generous timeouts and is idempotent, so over-long mutations redeliver and re-run.
  - name: "compliance-erase-processor"
    stream_name: "compliance"
    durable_name: "compliance-erase-processor-durable"
    filter_subject: "compliance.erase"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for analytics events -> ClickHouse
  - name: "events-writer"
    stream_name: "events"
    durable_name: "events-writer-durable"
    max_deliver: 5

  - name: "misc-email-processor"
    stream_name: "misc"
    durable_name: "misc-email-processor"
    filter_subject: "misc.email.jobs"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
