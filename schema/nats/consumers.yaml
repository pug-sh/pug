# NATS JetStream Consumers Configuration
consumers:
  # Consumer for device events
  - name: "device-processor"
    stream_name: "devices"
    durable_name: "device-processor-durable"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5

  # Consumer for campaign events
  - name: "campaign-processor"
    stream_name: "campaigns"
    durable_name: "campaign-processor-durable"
    max_deliver: 5

  # Consumer for profile identify events
  - name: "profile-identify-processor"
    stream_name: "profiles"
    durable_name: "profile-identify-processor-durable"
    filter_subject: "profiles.identify"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for profile alias events
  - name: "profile-alias-processor"
    stream_name: "profiles"
    durable_name: "profile-alias-processor-durable"
    filter_subject: "profiles.alias"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for profile upsert events -> ClickHouse
  - name: "profile-upsert-processor"
    stream_name: "profiles"
    durable_name: "profile-upsert-processor-durable"
    filter_subject: "profiles.upsert"
    deliver_policy: "all"
    ack_explicit: true
    max_deliver: 5
    replay_policy: "instant"

  # Consumer for analytics events -> ClickHouse
  - name: "events-writer"
    stream_name: "events"
    durable_name: "events-writer-durable"
    max_deliver: 5
