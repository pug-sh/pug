  - name: "dlq-deliveries"
    subjects: ["dlq.deliveries.>"]
    description: "Dead letter queue for delivery events"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000  # ~1GB
    max_age: 720h  # 30 days
