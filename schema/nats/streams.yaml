  - name: "dlq-events"
    subjects: ["dlq.events.>"]
    description: "Dead letter queue for analytics events"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000  # ~1GB
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  - name: "dlq-profiles"
    subjects: ["dlq.profiles.>"]
