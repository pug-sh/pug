# NATS JetStream Streams Configuration
streams:
  # Stream for profile events
  - name: "profiles"
    subjects: ["profiles.>"]
    description: "Events related to profile management"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: -1
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  # Stream for GDPR/DPDP compliance jobs (erasure, export, retention)
  - name: "compliance"
    subjects: ["compliance.>"]
    description: "Low-volume GDPR/DPDP compliance jobs"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: -1
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  # Stream for analytics events
  - name: "events"
    subjects: ["events.>"]
    description: "Analytics events from SDKs and internal services"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: -1
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  - name: "misc"
    subjects: ["misc.>"]
    description: "Low-throughput miscellaneous jobs"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: -1
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  - name: "dlq-events"
    subjects: ["dlq.events.>"]
    description: "Dead letter queue for analytics events"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000  # ~1GB
    max_age: 720h  # 30 days
    storage: "file"
    # Reject new dead-letters when full rather than silently dropping the oldest
    # evidence; the failed publish surfaces as nats.dlq_messages_total{outcome=dropped}.
    discard: "new"
    num_replicas: 1

  - name: "dlq-profiles"
    subjects: ["dlq.profiles.>"]
    description: "Dead letter queue for profile events"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000  # ~1GB
    max_age: 720h  # 30 days
    storage: "file"
    discard: "new"
    num_replicas: 1

  - name: "dlq-compliance"
    subjects: ["dlq.compliance.>"]
    description: "Dead letter queue for compliance jobs"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000  # ~1GB
    max_age: 720h  # 30 days
    storage: "file"
    num_replicas: 1

  - name: "dlq-misc"
    subjects: ["dlq.misc.>"]
    description: "Dead letter queue for miscellaneous jobs"
    retention_policy: "limits"
    max_consumers: -1
    max_msgs: -1
    max_bytes: 1000000000
    max_age: 720h  # 30 days
    storage: "file"
    discard: "new"
    num_replicas: 1
