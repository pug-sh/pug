edition = "2023";
package users.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/users/v1;usersv1";

service UsersService {
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc GetByExternalId(GetByExternalIdRequest) returns (GetByExternalIdResponse) {}
  rpc ListByProject(ListByProjectRequest) returns (ListByProjectResponse) {}
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  
  // SDK support methods
  rpc CreateOrGetByExternalId(CreateOrGetByExternalIdRequest) returns (CreateOrGetByExternalIdResponse) {}
  rpc LinkUserToSubscription(LinkUserToSubscriptionRequest) returns (LinkUserToSubscriptionResponse) {}
  rpc GetUserBySubscription(GetUserBySubscriptionRequest) returns (GetUserBySubscriptionResponse) {}
}

message User {
  string id = 1;
  string external_id = 2;
  string project_id = 3;
  map<string, google.protobuf.Any> metadata = 4;
  google.protobuf.Timestamp create_time = 5;
  google.protobuf.Timestamp update_time = 6;
}

// Create user
message CreateRequest {
  string external_id = 1;
  map<string, google.protobuf.Any> metadata = 2;
}

message CreateResponse {
  User user = 1;
}

// Get user by external ID
message GetByExternalIdRequest {
  string external_id = 1;
}

message GetByExternalIdResponse {
  User user = 1;
}

// List users by project
message ListByProjectRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListByProjectResponse {
  repeated User users = 1;
  int32 total_count = 2;
}

// Update user metadata
message UpdateMetadataRequest {
  string external_id = 1;
  map<string, google.protobuf.Any> metadata = 2;
}

message UpdateMetadataResponse {
  User user = 1;
}

// Delete user
message DeleteRequest {
  string external_id = 1;
}

message DeleteResponse {
  bool success = 1;
}

// SDK support methods

// Create user if not exists, or get existing user by external_id
message CreateOrGetByExternalIdRequest {
  string external_id = 1;
  map<string, google.protobuf.Any> metadata = 2;
}

message CreateOrGetByExternalIdResponse {
  User user = 1;
  bool was_created = 2;
}

message LinkUserToSubscriptionRequest {
  string external_id = 1;
  string subscription_id = 2;
  map<string, google.protobuf.Any> user_metadata = 3;
}

message LinkUserToSubscriptionResponse {
  User user = 1;
  bool user_was_created = 2;
  bool subscription_was_linked = 3;
}

// Get user associated with a subscription
message GetUserBySubscriptionRequest {
  string subscription_id = 1;
}

message GetUserBySubscriptionResponse {
  User user = 1;
  bool has_user = 2;
}
