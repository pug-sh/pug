edition = "2023";
package segments.v1;

import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/segments/v1;segmentsv1";

service SegmentsService {
  rpc CreateSegment(CreateSegmentRequest) returns (CreateSegmentResponse) {}
  rpc GetSegment(GetSegmentRequest) returns (GetSegmentResponse) {}
  rpc ListSegments(ListSegmentsRequest) returns (ListSegmentsResponse) {}
  rpc UpdateSegment(UpdateSegmentRequest) returns (UpdateSegmentResponse) {}
  rpc DeleteSegment(DeleteSegmentRequest) returns (DeleteSegmentResponse) {}
  rpc EvaluateSegment(EvaluateSegmentRequest) returns (EvaluateSegmentResponse) {}
}

message Segment {
  string id = 1;
  string project_id = 2;
  string name = 3;
  string description = 4;
  SegmentFilter filter = 5;
  bool is_active = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
}

message SegmentFilter {
  repeated FilterPart parts = 1;  // Either sub-filters or conditions
  string logical_operator = 2;    // "AND" or "OR"
}

message FilterPart {
  oneof part {
    SegmentFilter sub_filter = 1;  // For nested filters
    Condition condition = 2;       // For individual conditions
  }
}

message Condition {
  string field = 1;
  string operator = 2; // "EQUALS", "NOT_EQUALS", "GREATER_THAN", "LESS_THAN", "CONTAINS", "NOT_CONTAINS", "IN_LAST_X_DAYS", etc.
  string value = 3;
}

// Create segment
message CreateSegmentRequest {
  string project_id = 1;
  string name = 2;
  string description = 3;
  SegmentFilter filter = 4;
}

message CreateSegmentResponse {
  Segment segment = 1;
}

// Get segment
message GetSegmentRequest {
  string segment_id = 1;
}

message GetSegmentResponse {
  Segment segment = 1;
}

// List segments
message ListSegmentsRequest {
  string project_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListSegmentsResponse {
  repeated Segment segments = 1;
  int32 total_count = 2;
}

// Update segment
message UpdateSegmentRequest {
  string segment_id = 1;
  string name = 2;
  string description = 3;
  SegmentFilter filter = 4;
  bool is_active = 5;
}

message UpdateSegmentResponse {
  Segment segment = 1;
}

// Delete segment
message DeleteSegmentRequest {
  string segment_id = 1;
}

message DeleteSegmentResponse {
  bool success = 1;
}

// Evaluate segment - to check if a user matches the segment criteria
message EvaluateSegmentRequest {
  string segment_id = 1;
  string user_external_id = 2;
}

message EvaluateSegmentResponse {
  bool matches = 1;
}