edition = "2023";
package devices.v1;

import "buf/validate/validate.proto";
import "google/protobuf/any.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/devices/v1;devicesv1";

service DevicesService {
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse) {}
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse) {}
  rpc UpdateToken(UpdateTokenRequest) returns (UpdateTokenResponse) {}
}

message SubscribeRequest {
  option (buf.validate.message).cel = {
    id: "subscribe_request.profile_identifier"
    message: "either profile_id or profile_external_id must be provided"
    expression: "this.profile_id != '' || this.profile_external_id != ''"
  };
  string device_id = 1 [(buf.validate.field).string = {len: 20}];
  string platform = 2 [(buf.validate.field).string = {in: ["android", "ios", "web"]}];
  string profile_external_id = 3;
  string profile_id = 4;
  string token = 5 [(buf.validate.field).required = true];
  map<string, google.protobuf.Any> properties = 6;
}

message SubscribeResponse {}

message UpdateStatusRequest {
  string id = 1 [(buf.validate.field).string = {len: 20}];
  string status = 2 [(buf.validate.field).string = {in: ["active", "inactive"]}];
}

message UpdateStatusResponse {}

message UpdateTokenRequest {
  string id = 1 [(buf.validate.field).string = {len: 20}];
  string token = 2 [(buf.validate.field).required = true];
}

message UpdateTokenResponse {}

enum DeviceOperationType {
  DEVICE_OPERATION_TYPE_UNSPECIFIED = 0;
  DEVICE_OPERATION_TYPE_UPDATE_STATUS = 1;
  DEVICE_OPERATION_TYPE_UPDATE_TOKEN = 2;
  DEVICE_OPERATION_TYPE_SUBSCRIBE = 3;
}

message DeviceOperationMessage {
  string device_id = 1;
  DeviceOperationType operation_type = 2;
  string platform = 3;
  string profile_external_id = 4;
  string project_id = 5;
  map<string, google.protobuf.Any> properties = 6;
  string status = 7;
  string token = 8;
  string profile_id = 9;
}
