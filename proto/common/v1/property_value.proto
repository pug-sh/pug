edition = "2023";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/common/v1;commonv1";

// PropertyValue is the typed value of an event property.
// Exactly one variant must be set; this is enforced by the protovalidate
// oneof.required option below.
//
// Lists, objects, and other compound types are intentionally not included
// in this iteration — only the five primitive types supported by the
// ClickHouse Variant storage target. New variants can be added later as
// additive oneof entries (wire-compatible).
message PropertyValue {
  oneof value {
    option (buf.validate.oneof).required = true;

    // Cap property string values at 1 KiB on the wire. Large blobs
    // (logs, raw payloads, serialized JSON) should be hashed or referenced
    // upstream rather than embedded as a property value — this limit makes
    // that a hard rule rather than a soft guideline. Limit is bytes, not
    // codepoints; values exceeding it are rejected at the validate
    // interceptor with CodeInvalidArgument (not truncated).
    string                    string_value    = 1 [(buf.validate.field).string.max_len = 1024];

    int64                     int_value       = 2;
    double                    double_value    = 3 [(buf.validate.field).double.finite = true];
    bool                      bool_value      = 4;
    // Stored as DateTime64(3); sub-millisecond precision is truncated at
    // the ingestion boundary to match the ClickHouse Variant slot's precision.
    google.protobuf.Timestamp timestamp_value = 5;
  }
}
