edition = "2023";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/common/v1;commonv1";

// PropertyValue is the typed value of an event property.
// Exactly one variant must be set; an unset value is invalid.
message PropertyValue {
  option (buf.validate.message).cel = {
    id: "property_value.exactly_one_set"
    message: "PropertyValue must have exactly one of {string,int,double,bool,timestamp,list} set"
    expression: "has(this.string_value) || has(this.int_value) || has(this.double_value) || has(this.bool_value) || has(this.timestamp_value) || has(this.list_value)"
  };

  oneof kind {
    string                    string_value    = 1 [(buf.validate.field).string.max_len = 1024];
    int64                     int_value       = 2;
    double                    double_value    = 3 [(buf.validate.field).double.finite = true];
    bool                      bool_value      = 4;
    google.protobuf.Timestamp timestamp_value = 5;
    PropertyList              list_value      = 6;
  }
}

message PropertyList {
  repeated PropertyValue values = 1 [(buf.validate.field).repeated.max_items = 256];
}
