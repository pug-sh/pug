edition = "2023";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/common/v1;commonv1";

enum PropertySource {
  PROPERTY_SOURCE_UNSPECIFIED = 0;
  PROPERTY_SOURCE_AUTO = 1;
  PROPERTY_SOURCE_CUSTOM = 2;
  PROPERTY_SOURCE_PROFILE = 3;
}

// PropertyValueType enumerates the storage-side variant types a property key
// can have. Mirrors the ClickHouse Variant inner types used in
// events.custom_properties: String, Int64, Float64, Bool, DateTime64(3).
// NUMBER covers both Int64 and Float64 (the dashboard treats them uniformly).
// OTHER is a catch-all for non-primitive types (e.g. JSON objects/arrays in
// profile properties) that don't map to a specific variant.
enum PropertyValueType {
  PROPERTY_VALUE_TYPE_UNSPECIFIED = 0;
  PROPERTY_VALUE_TYPE_STRING      = 1;
  PROPERTY_VALUE_TYPE_NUMBER      = 2;
  PROPERTY_VALUE_TYPE_BOOLEAN     = 3;
  PROPERTY_VALUE_TYPE_DATETIME    = 4;
  PROPERTY_VALUE_TYPE_OTHER       = 5;
}

message EventNameMeta {
  string name = 1;
  uint64 count = 2;
  google.protobuf.Timestamp last_seen_at = 3;
}

message PropertyKeyMeta {
  string name = 1;
  uint64 count = 2;
  google.protobuf.Timestamp last_seen_at = 3;
  // One of the value types observed for this property key. When values for
  // the same key span multiple types (rare drift), this is non-deterministic
  // and may change between calls — clients should treat it as a hint, not a
  // contract.
  PropertyValueType value_type = 4;
}

// GetFilterSchemaRequest is shared by every service that exposes a
// GetFilterSchema RPC (currently shared.activity.v1 and shared.insights.v1).
// Keeping the request shape here avoids drift between services and is also a
// signal that the filter-schema concept is service-agnostic.
message GetFilterSchemaRequest {
  string event_kind = 1 [(buf.validate.field) = {
    string: {pattern: "^[a-zA-Z0-9_.-]*$"}
  }];
  repeated PropertyValueType allowed_types = 2 [
    (buf.validate.field).repeated.items = {
      enum: {defined_only: true, not_in: [0]}
    }
  ];
}

// GetFilterSchemaResponse mirrors the shared request shape — same reason.
message GetFilterSchemaResponse {
  repeated EventNameMeta events = 1;
  repeated PropertyKeyMeta auto_property_keys = 2;
  repeated PropertyKeyMeta custom_property_keys = 3;
  repeated PropertyKeyMeta profile_property_keys = 4;
}
