edition = "2023";
package common.v1;

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/common/v1;commonv1";

// Well-known event property schemas.
//
// These messages define typed properties for common event kinds. They do not
// change the Event wire format — SDKs serialize fields into
// Event.custom_properties (map<string, string>) before sending.
//
// Each message corresponds to an event kind string documented in its comment.
// SDKs use these to provide autocomplete, compile-time checks, and consistent
// type/struct hints across languages.

// Navigation events ──────────────────────────────────────────────────────────

// kind: "page_view"
message PageViewProperties {}

// kind: "click"
message ClickProperties {
  string class = 1;
  string id = 2;
  string tag = 3;
  string text = 4;
  int32 x = 5;
  int32 y = 6;
}

// kind: "rage_click"
message RageClickProperties {
  int32 click_count = 1;
  string element = 2;
  int32 x = 3;
  int32 y = 4;
}

// kind: "dead_click"
message DeadClickProperties {
  string element = 1;
  string text = 2;
  int32 x = 3;
  int32 y = 4;
}

// kind: "scroll"
message ScrollProperties {
  int32 percent = 1;
  int32 scroll_y = 2;
}

// Commerce events ────────────────────────────────────────────────────────────

// kind: "search"
message SearchProperties {
  string query = 1;
}

// kind: "add_to_cart"
message AddToCartProperties {
  string product_id = 1;
  double amount = 2;
  string currency = 3;
}

// kind: "checkout_started"
message CheckoutStartedProperties {
  string product_id = 1;
  double amount = 2;
  string currency = 3;
}

// kind: "checkout_completed"
message CheckoutCompletedProperties {
  string product_id = 1;
  double amount = 2;
  string currency = 3;
}

// kind: "purchase"
message PurchaseProperties {
  string product_id = 1;
  double amount = 2;
  string currency = 3;
}

// Form events ────────────────────────────────────────────────────────────────

// kind: "form_start"
message FormStartProperties {
  string form_id = 1;
  string form_name = 2;
}

// kind: "form_submit"
message FormSubmitProperties {
  string action = 1;
  string form_id = 2;
  string form_name = 3;
}

// Auth events ────────────────────────────────────────────────────────────────

// kind: "signup"
message SignupProperties {}

// kind: "login"
message LoginProperties {}

// kind: "logout"
message LogoutProperties {}

// App lifecycle events ───────────────────────────────────────────────────────

// kind: "app_open"
message AppOpenProperties {}

// kind: "app_close"
message AppCloseProperties {}

// Notification events ────────────────────────────────────────────────────────

// kind: "notification_received"
message NotificationReceivedProperties {
  string campaign_id = 1;
  string notification_type = 2;
}

// kind: "notification_clicked"
message NotificationClickedProperties {
  string campaign_id = 1;
  string notification_type = 2;
}

// kind: "notification_dismissed"
message NotificationDismissedProperties {
  string campaign_id = 1;
  string notification_type = 2;
}

// Media events ───────────────────────────────────────────────────────────────

// kind: "video_play"
message VideoPlayProperties {
  string video_id = 1;
  int32 position_s = 2;
}

// kind: "video_pause"
message VideoPauseProperties {
  string video_id = 1;
  int32 position_s = 2;
}

// Error events ───────────────────────────────────────────────────────────────

// kind: "error_occurred"
message ErrorOccurredProperties {
  string error_code = 1;
}

// Social events ──────────────────────────────────────────────────────────────

// kind: "share"
message ShareProperties {}
