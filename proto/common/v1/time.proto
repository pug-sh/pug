edition = "2023";
package common.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/common/v1;commonv1";

message TimeRange {
  option (buf.validate.message).cel = {
    id: "time_range.from_before_to"
    message: "time_range.from must be before time_range.to"
    expression: "this.from < this.to"
  };
  google.protobuf.Timestamp from = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp to = 2 [(buf.validate.field).required = true];
}

enum TimeRangePreset {
  TIME_RANGE_PRESET_UNSPECIFIED = 0;
  TIME_RANGE_PRESET_LAST_1_HOUR = 1;
  TIME_RANGE_PRESET_LAST_6_HOURS = 2;
  TIME_RANGE_PRESET_LAST_24_HOURS = 3;
  TIME_RANGE_PRESET_YESTERDAY = 4;
  TIME_RANGE_PRESET_LAST_7_DAYS = 5;
  TIME_RANGE_PRESET_LAST_14_DAYS = 6;
  TIME_RANGE_PRESET_LAST_WEEK = 7;
  TIME_RANGE_PRESET_LAST_MONTH = 8;
  TIME_RANGE_PRESET_LAST_3_MONTHS = 9;
  TIME_RANGE_PRESET_LAST_6_MONTHS = 10;
  TIME_RANGE_PRESET_LAST_YEAR = 11;
}
