edition = "2023";
package public.auth.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/public/auth/v1;authv1";

service AuthService {
  rpc SignInWithEmail(SignInWithEmailRequest) returns (SignInWithEmailResponse) {}
  rpc RequestMagicLink(RequestMagicLinkRequest) returns (RequestMagicLinkResponse) {}
  rpc CompleteMagicLink(CompleteMagicLinkRequest) returns (CompleteMagicLinkResponse) {}
  rpc BeginOAuthSignIn(BeginOAuthSignInRequest) returns (BeginOAuthSignInResponse) {}
  rpc CompleteOAuthSignIn(CompleteOAuthSignInRequest) returns (CompleteOAuthSignInResponse) {}
}

message SignInWithEmailRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  // bcrypt accepts at most 72 bytes; rejecting longer inputs at the
  // interceptor avoids surfacing bcrypt.ErrPasswordTooLong as CodeInternal.
  string password = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_bytes = 72
  ];
}

message SignInWithEmailResponse {
  string token = 1;
}

message RequestMagicLinkRequest {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
}

message RequestMagicLinkResponse {}

message CompleteMagicLinkRequest {
  string token = 1 [(buf.validate.field).required = true];
}

message CompleteMagicLinkResponse {
  string token = 1; // session JWT
}

enum OAuthProvider {
  O_AUTH_PROVIDER_UNSPECIFIED = 0;
  O_AUTH_PROVIDER_GOOGLE = 1;
}

message BeginOAuthSignInRequest {
  OAuthProvider provider = 1 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  string redirect_uri = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uri = true
  ];
}

message BeginOAuthSignInResponse {
  string authorization_url = 1;
  string state = 2;
}

message CompleteOAuthSignInRequest {
  OAuthProvider provider = 1 [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  string code = 2 [(buf.validate.field).required = true];
  string state = 3 [(buf.validate.field).required = true];
}

message CompleteOAuthSignInResponse {
  string token = 1; // session JWT — sign-in OR sign-up, decided server-side
}
