edition = "2023";
package insights.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/insights/v1;insightsv1";

service InsightsService {
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc SegmentUsers(SegmentUsersRequest) returns (SegmentUsersResponse);
}

message QueryRequest {
  InsightType insight_type = 1 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  TimeRange time_range = 2 [(buf.validate.field).required = true];
  Granularity granularity = 3 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  repeated EventQuery events = 4;
  repeated PropertyFilter filters = 5;
  repeated Breakdown breakdowns = 6 [(buf.validate.field).repeated.max_items = 5];
  int32 breakdown_limit = 7 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
}

message QueryResponse {
  repeated Series series = 1;
}

message SegmentUsersRequest {
  TimeRange time_range = 1 [(buf.validate.field).required = true];
  repeated EventQuery events = 2 [(buf.validate.field).repeated.min_items = 1];
  repeated PropertyFilter filters = 3;
  int32 page_size = 4 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];
  string page_token = 5;
}

message SegmentUsersResponse {
  repeated string distinct_ids = 1;
  string next_page_token = 2;
}

enum InsightType {
  INSIGHT_TYPE_UNSPECIFIED = 0;
  INSIGHT_TYPE_TRENDS = 1;
  INSIGHT_TYPE_SEGMENTATION = 2;
}

enum Granularity {
  GRANULARITY_UNSPECIFIED = 0;
  GRANULARITY_HOUR = 1;
  GRANULARITY_DAY = 2;
  GRANULARITY_WEEK = 3;
  GRANULARITY_MONTH = 4;
}

enum AggregationType {
  AGGREGATION_TYPE_UNSPECIFIED = 0;
  AGGREGATION_TYPE_TOTAL = 1;
  AGGREGATION_TYPE_UNIQUE_USERS = 2;
  AGGREGATION_TYPE_PER_USER_AVG = 3;
}

enum FilterOperator {
  FILTER_OPERATOR_UNSPECIFIED = 0;
  FILTER_OPERATOR_EQUALS = 1;
  FILTER_OPERATOR_NOT_EQUALS = 2;
  FILTER_OPERATOR_CONTAINS = 3;
  FILTER_OPERATOR_NOT_CONTAINS = 4;
  FILTER_OPERATOR_IS_SET = 5;
  FILTER_OPERATOR_IS_NOT_SET = 6;
}

message TimeRange {
  option (buf.validate.message).cel = {
    id: "time_range.from_before_to"
    message: "time_range.from must be before time_range.to"
    expression: "this.from < this.to"
  };
  google.protobuf.Timestamp from = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp to = 2 [(buf.validate.field).required = true];
}

message EventQuery {
  string kind = 1;
  repeated PropertyFilter filters = 2;
  AggregationType aggregation = 3 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
}

message PropertyFilter {
  option (buf.validate.message).cel = {
    id: "property_filter.value_required"
    message: "value is required for this operator"
    // IS_SET (5) and IS_NOT_SET (6) don't require a value
    expression: "this.operator in [5, 6] || this.value != ''"
  };
  string property = 1 [(buf.validate.field) = {required: true, string: {pattern: "^[a-zA-Z0-9_.-]+$"}}];
  FilterOperator operator = 2 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  string value = 3;
}

message Breakdown {
  string property = 1 [(buf.validate.field).required = true];
}

message Series {
  string label = 1;
  string event_kind = 2;
  map<string, string> breakdown = 3;
  repeated DataPoint points = 4;
  double total = 5;
}

message DataPoint {
  google.protobuf.Timestamp time = 1;
  double value = 2;
}
