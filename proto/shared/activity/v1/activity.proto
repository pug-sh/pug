edition = "2023";
package shared.activity.v1;

import "buf/validate/validate.proto";
import "common/v1/filter_schema.proto";
import "common/v1/filters.proto";
import "common/v1/time.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/shared/activity/v1;activityv1";

// ActivityService provides paginated access to raw event data.
service ActivityService {
  // GetActivityFeed returns a paginated, filterable list of events for a user profile.
  // Resolves profile aliases so merged anonymous events are included.
  rpc GetActivityFeed(GetActivityFeedRequest) returns (GetActivityFeedResponse);
  // GetEventExplorer returns a paginated, filterable list of events across all users
  // in a project. Does not resolve aliases.
  rpc GetEventExplorer(GetEventExplorerRequest) returns (GetEventExplorerResponse);
  // GetFilterSchema returns event names, property keys, and profile property keys for filter UIs.
  rpc GetFilterSchema(GetFilterSchemaRequest) returns (GetFilterSchemaResponse);
  // GetPropertyValues returns distinct values for a given property key.
  rpc GetPropertyValues(GetPropertyValuesRequest) returns (GetPropertyValuesResponse);
  // GetActivityHeatmap returns per-day event counts for a user profile over a time window.
  // Defaults to the last 60 days when no time_range is provided.
  rpc GetActivityHeatmap(GetActivityHeatmapRequest) returns (GetActivityHeatmapResponse);
}

message GetActivityFeedRequest {
  // In a multi-event filter list, each event must specify a kind or at least one property filter.
  // A single-element list with an empty EventFilter is allowed (matches all events).
  option (buf.validate.message).cel = {
    id: "activity_feed.events_non_empty_in_multi"
    message: "each event filter must specify a kind or at least one property filter"
    expression:
      "this.events.size() <= 1"
      "|| this.events.all(e, e.kind != '' || e.filters.size() > 0)"
  };
  // Required. The profile ID to fetch events for.
  string distinct_id = 1 [(buf.validate.field).required = true];
  // Optional. Filter by session. Empty means all sessions.
  string session_id = 2;
  // Optional. Restrict to events within this time window.
  common.v1.TimeRange time_range = 3;
  // Optional. Filter by event properties (auto or custom).
  repeated common.v1.PropertyFilter property_filters = 4 [(buf.validate.field).repeated.max_items = 20];
  // 0 means server default (100). Max 1000.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];
  // Opaque cursor from a previous response's next_page_token. Empty for the first page.
  string page_token = 6;
  // Optional. Filter by multiple event types with per-event property filters.
  repeated common.v1.EventFilter events = 7 [(buf.validate.field).repeated.max_items = 50];
}

message ActivityEvent {
  string event_id = 1;
  string kind = 2;
  string distinct_id = 3;
  google.protobuf.Timestamp occur_time = 4;
  // May be empty if no session was active.
  string session_id = 5;
  // System-enriched properties (geo, user-agent, etc.).
  google.protobuf.Struct auto_properties = 6;
  // Client-supplied custom properties.
  google.protobuf.Struct custom_properties = 7;
}

message GetActivityFeedResponse {
  repeated ActivityEvent events = 1;
  // Empty when there are no more pages.
  string next_page_token = 2;
}

message GetEventExplorerRequest {
  // In a multi-event filter list, each event must specify a kind or at least one property filter.
  option (buf.validate.message).cel = {
    id: "event_explorer.events_non_empty_in_multi"
    message: "each event filter must specify a kind or at least one property filter"
    expression:
      "this.events.size() <= 1"
      "|| this.events.all(e, e.kind != '' || e.filters.size() > 0)"
  };
  // Optional. Filter to a specific user. Empty means all users.
  string distinct_id = 1;
  // Optional. Filter by session. Empty means all sessions.
  string session_id = 2;
  // Optional. Restrict to events within this time window.
  common.v1.TimeRange time_range = 3;
  // Optional. Filter by event properties (auto or custom).
  repeated common.v1.PropertyFilter property_filters = 4 [(buf.validate.field).repeated.max_items = 20];
  // 0 means server default (100). Max 1000.
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 1000
  }];
  // Opaque cursor from a previous response's next_page_token. Empty for the first page.
  string page_token = 6;
  // Optional. Filter by multiple event types with per-event property filters.
  repeated common.v1.EventFilter events = 7 [(buf.validate.field).repeated.max_items = 50];
}

message GetEventExplorerResponse {
  repeated ActivityEvent events = 1;
  // Empty when there are no more pages.
  string next_page_token = 2;
}

message GetFilterSchemaRequest {
  string event_kind = 1 [(buf.validate.field) = {
    string: {pattern: "^[a-zA-Z0-9_.-]*$"}
  }];
}

message GetFilterSchemaResponse {
  repeated common.v1.EventNameMeta events = 1;
  repeated common.v1.PropertyKeyMeta auto_property_keys = 2;
  repeated common.v1.PropertyKeyMeta custom_property_keys = 3;
  repeated common.v1.PropertyKeyMeta profile_property_keys = 4;
}

message GetPropertyValuesRequest {
  string property_key = 1 [(buf.validate.field) = {
    required: true
    string: {pattern: "^\\$?[a-zA-Z0-9_.-]+$"}
  }];
  common.v1.PropertySource source = 2 [(buf.validate.field) = {
    required: true
    enum: {defined_only: true}
  }];
  string event_kind = 3 [(buf.validate.field) = {
    string: {pattern: "^[a-zA-Z0-9_.-]*$"}
  }];
}

message GetPropertyValuesResponse {
  repeated string values = 1;
}

message GetActivityHeatmapRequest {
  string distinct_id = 1 [(buf.validate.field).required = true];
  // Optional. Defaults to the last 60 days when omitted.
  common.v1.TimeRange time_range = 2;
}

// HeatmapDay holds the event count for a single calendar day.
message HeatmapDay {
  // Date in YYYY-MM-DD format (UTC).
  string date = 1;
  int64 count = 2;
}

message GetActivityHeatmapResponse {
  repeated HeatmapDay days = 1;
}
