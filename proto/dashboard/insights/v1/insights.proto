edition = "2023";
package dashboard.insights.v1;

import "buf/validate/validate.proto";
import "common/v1/filters.proto";
import "common/v1/time.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/dashboard/insights/v1;insightsv1";

service InsightsService {
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc SegmentUsers(SegmentUsersRequest) returns (SegmentUsersResponse);
  rpc GetFilterSchema(GetFilterSchemaRequest) returns (GetFilterSchemaResponse);
  rpc GetPropertyValues(GetPropertyValuesRequest) returns (GetPropertyValuesResponse);
}

message QueryRequest {
  InsightType insight_type = 1 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  common.v1.TimeRange time_range = 2 [(buf.validate.field).required = true];
  Granularity granularity = 3 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  repeated EventQuery events = 4;
  repeated common.v1.PropertyFilter filters = 5;
  repeated Breakdown breakdowns = 6 [(buf.validate.field).repeated.max_items = 5];
  int32 breakdown_limit = 7 [(buf.validate.field).int32 = {gte: 0, lte: 100}];
}

message QueryResponse {
  repeated Series series = 1;
}

message SegmentUsersRequest {
  common.v1.TimeRange time_range = 1 [(buf.validate.field).required = true];
  repeated EventQuery events = 2 [(buf.validate.field).repeated.min_items = 1];
  repeated common.v1.PropertyFilter filters = 3;
  int32 page_size = 4 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];
  string page_token = 5;
}

message SegmentUsersResponse {
  repeated string distinct_ids = 1;
  string next_page_token = 2;
}

enum InsightType {
  INSIGHT_TYPE_UNSPECIFIED = 0;
  INSIGHT_TYPE_TRENDS = 1;
  INSIGHT_TYPE_SEGMENTATION = 2;
}

enum Granularity {
  GRANULARITY_UNSPECIFIED = 0;
  GRANULARITY_HOUR = 1;
  GRANULARITY_DAY = 2;
  GRANULARITY_WEEK = 3;
  GRANULARITY_MONTH = 4;
}

enum AggregationType {
  AGGREGATION_TYPE_UNSPECIFIED = 0;
  AGGREGATION_TYPE_TOTAL = 1;
  AGGREGATION_TYPE_UNIQUE_USERS = 2;
  AGGREGATION_TYPE_PER_USER_AVG = 3;
}

message EventQuery {
  string kind = 1;
  repeated common.v1.PropertyFilter filters = 2;
  AggregationType aggregation = 3 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
}

message Breakdown {
  string property = 1 [(buf.validate.field) = {required: true, string: {pattern: "^\\$?[a-zA-Z0-9_.-]+$"}}];
}

// Series represents a single data series in a query response.
//
// For TRENDS without breakdowns: event_kind + points are set.
// For TRENDS with breakdowns: breakdown + points are set.
// For SEGMENTATION: total is set.
message Series {
  string label = 1; // Reserved for future use.
  string event_kind = 2;
  map<string, string> breakdown = 3;
  repeated DataPoint points = 4;
  double total = 5;
}

message DataPoint {
  google.protobuf.Timestamp time = 1;
  double value = 2;
}

message GetPropertyValuesRequest {
  string property_key   = 1 [(buf.validate.field) = {required: true, string: {pattern: "^\\$?[a-zA-Z0-9_.-]+$"}}];
  PropertySource source = 2 [(buf.validate.field) = {required: true, enum: {defined_only: true}}];
  string event_kind     = 3;
}

message GetPropertyValuesResponse {
  repeated string values = 1;
}

enum PropertySource {
  PROPERTY_SOURCE_UNSPECIFIED = 0;
  PROPERTY_SOURCE_AUTO        = 1;
  PROPERTY_SOURCE_CUSTOM      = 2;
  PROPERTY_SOURCE_PROFILE     = 3;
}

message GetFilterSchemaRequest {
  string event_kind = 1;
}

message EventNameMeta {
  string name                            = 1;
  uint64 count                           = 2;
  google.protobuf.Timestamp last_seen_at = 3;
}

message PropertyKeyMeta {
  string name                            = 1;
  uint64 count                           = 2;
  google.protobuf.Timestamp last_seen_at = 3;
}

message GetFilterSchemaResponse {
  repeated EventNameMeta   events               = 1;
  repeated PropertyKeyMeta auto_property_keys   = 2;
  repeated PropertyKeyMeta custom_property_keys = 3;
  repeated string          profile_property_keys = 4;
}
