edition = "2023";
package dashboard.projects.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/dashboard/projects/v1;projectsv1";

service ProjectsService {
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc UpdateMeta(UpdateMetaRequest) returns (UpdateMetaResponse) {}
  rpc UpdateFCMServiceJSON(UpdateFCMServiceJSONRequest) returns (UpdateFCMServiceJSONResponse) {}
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse) {}
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse) {}
  rpc DeleteApiKey(DeleteApiKeyRequest) returns (DeleteApiKeyResponse) {}
}

enum ApiKeyKind {
  API_KEY_KIND_UNSPECIFIED = 0;
  // Embedded in client apps to send events. Extractable by anyone who ships it,
  // so it is not a secret: it is stored and returned in full.
  API_KEY_KIND_PUBLIC = 1;
  // Authenticates server-side and MCP callers against the whole project. Stored
  // only as a digest and returned exactly once, by CreateApiKey.
  API_KEY_KIND_PRIVATE = 2;
}

message BatchGetRequest {
  string org_id = 1 [(buf.validate.field).required = true];
}

message BatchGetResponse {
  repeated Project projects = 1;
}

message CreateRequest {
  string display_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.max_len = 150
  ];
  string org_id = 2 [(buf.validate.field).required = true];
  // Optional IANA timezone (e.g. "Asia/Kolkata") captured from the creator's browser
  // and stored as the project's reporting_timezone. Empty = UTC. A malformed value is
  // coerced to UTC server-side rather than rejected, so creation never fails on it.
  string reporting_timezone = 3 [(buf.validate.field).string = {
    max_len: 64
    pattern: "^[A-Za-z0-9_+/-]*$"
  }];
}

message CreateResponse {
  Project project = 1;
}

message DeleteRequest {}

message DeleteResponse {}

message GetRequest {}

message GetResponse {
  Project project = 1;
}

message Project {
  string display_name = 1;
  string fcm_service_json = 2;
  string id = 3;
  string org_id = 4;
  // 5 and 6 were private_api_key / public_api_key, back when a project carried a
  // single key pair on its own row. Keys are their own resource now: ListApiKeys
  // returns a project's keys, and CreateApiKey's response is the only place a
  // private key's value ever appears.
  reserved 5, 6;
  reserved private_api_key, public_api_key;
  // IANA reporting timezone (e.g. "Asia/Kolkata") used to bucket day/week/month
  // boundaries for this project's insights and dashboards. Empty string = UTC.
  string reporting_timezone = 7;
}

// ApiKey is one of a project's API keys. It never carries a private key's value:
// only its digest is stored, so CreateApiKey's response is the one and only time
// a private key is visible.
message ApiKey {
  google.protobuf.Timestamp create_time = 1;
  string display_name = 2;
  string id = 3;
  ApiKeyKind kind = 4;
  // Full value for a public key; empty for a private key — use `masked` to
  // identify one of those.
  string key = 5;
  // Fixed-format hint ("prv_...3f9c") to tell a project's keys apart.
  string masked = 6;
}

message ListApiKeysRequest {}

message ListApiKeysResponse {
  repeated ApiKey api_keys = 1;
}

message CreateApiKeyRequest {
  ApiKeyKind kind = 1 [(buf.validate.field) = {
    required: true
    enum: {
      defined_only: true
      not_in: [0]
    }
  }];
  // Optional label to tell keys apart on the settings page (e.g. "CI", "staging").
  string display_name = 2 [(buf.validate.field).string.max_len = 150];
}

message CreateApiKeyResponse {
  ApiKey api_key = 1;
  // The full key. For a private key this is the only time it is ever returned —
  // it is unrecoverable afterwards.
  string key = 2;
}

message DeleteApiKeyRequest {
  string id = 1 [(buf.validate.field).required = true];
}

message DeleteApiKeyResponse {}

// UpdateMetaRequest is a partial update of the project's editable metadata: every
// field is optional and an omitted field leaves the stored value unchanged. A
// present reporting_timezone of "" resets to UTC (distinct from omitted).
message UpdateMetaRequest {
  // Optional (partial update): omit to leave the name unchanged. When present it
  // must be 1–150 chars; an explicit "" is rejected.
  string display_name = 1 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 150
  ];
  // IANA timezone (e.g. "Asia/Kolkata") aligning insight/dashboard bucket
  // boundaries to the project's calendar. Empty = UTC. Unlike creation, a malformed
  // value is rejected (CodeInvalidArgument) rather than coerced — this is an
  // explicit settings action.
  string reporting_timezone = 2 [(buf.validate.field).string = {
    max_len: 64
    pattern: "^[A-Za-z0-9_+/-]*$"
  }];
}

message UpdateMetaResponse {
  Project project = 1;
}

message UpdateFCMServiceJSONRequest {
  string fcm_service_json = 1;
}

message UpdateFCMServiceJSONResponse {}
