edition = "2023";
package subscriptions.v1;

import "google/protobuf/any.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/subscriptions/v1;subscriptionsv1";

service SubscriptionsService {
  rpc RegisterSubscription(RegisterSubscriptionRequest) returns (RegisterSubscriptionResponse) {}
  rpc SetProfileExternalID(SetProfileExternalIDRequest) returns (SetProfileExternalIDResponse) {}
  rpc UpdateHeartbeat(UpdateHeartbeatRequest) returns (UpdateHeartbeatResponse) {}
  rpc UpdateMetadata(UpdateMetadataRequest) returns (UpdateMetadataResponse) {}
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse) {}
  rpc UpdateToken(UpdateTokenRequest) returns (UpdateTokenResponse) {}
  rpc Upsert(UpsertRequest) returns (UpsertResponse) {}
}

message RegisterSubscriptionRequest {
  map<string, google.protobuf.Any> metadata = 1;
  string platform = 2;
  string subscription_id = 3;
  string token = 4;
}

message RegisterSubscriptionResponse {
  string subscription_id = 1;
  bool success = 2;
}

message SetProfileExternalIDRequest {
  string external_id = 1;
  map<string, google.protobuf.Any> profile_metadata = 2;
  string subscription_id = 3;
}

message SetProfileExternalIDResponse {}

enum SubscriptionOperationType {
  SUBSCRIPTION_OPERATION_TYPE_UNSPECIFIED = 0;
  SUBSCRIPTION_OPERATION_TYPE_PROFILE_LINK = 1;
  SUBSCRIPTION_OPERATION_TYPE_UPDATE_HEARTBEAT = 2;
  SUBSCRIPTION_OPERATION_TYPE_UPDATE_METADATA = 3;
  SUBSCRIPTION_OPERATION_TYPE_UPDATE_STATUS = 4;
  SUBSCRIPTION_OPERATION_TYPE_UPDATE_TOKEN = 5;
  SUBSCRIPTION_OPERATION_TYPE_UPSERT = 6;
}

message SubscriptionOperationMessage {
  string external_id = 1;
  string id = 2;
  map<string, google.protobuf.Any> metadata = 3;
  SubscriptionOperationType operation_type = 4;
  string platform = 5;
  map<string, google.protobuf.Any> profile_metadata = 6;
  string project_id = 7;
  string status = 8;
  string subscription_id = 9;
  string token = 10;
}

message UpdateHeartbeatRequest {
  string id = 1;
}

message UpdateHeartbeatResponse {}

message UpdateMetadataRequest {
  string id = 1;
  map<string, google.protobuf.Any> metadata = 2;
}

message UpdateMetadataResponse {}

message UpdateStatusRequest {
  string id = 1;
  string status = 2;
}

message UpdateStatusResponse {}

message UpdateTokenRequest {
  string id = 1;
  string token = 2;
}

message UpdateTokenResponse {}

message UpsertRequest {
  string id = 1;
  map<string, google.protobuf.Any> metadata = 2;
  string platform = 3;
  string token = 4;
}

message UpsertResponse {}
