edition = "2023";
package projects.v1;

import "buf/validate/validate.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/projects/v1;projectsv1";

service ProjectsService {
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc UpdateDisplayName(UpdateDisplayNameRequest) returns (UpdateDisplayNameResponse) {}
  rpc UpdateFCMServiceJSON(UpdateFCMServiceJSONRequest) returns (UpdateFCMServiceJSONResponse) {}
}

message BatchGetRequest {
  string org_id = 1 [(buf.validate.field).required = true];
}

message BatchGetResponse {
  repeated Project projects = 1;
}

message CreateRequest {
  string display_name = 1 [(buf.validate.field).required = true];
  string org_id = 2 [(buf.validate.field).required = true];
}

message CreateResponse {
  Project project = 1;
}

message DeleteRequest {}

message DeleteResponse {}

message GetRequest {}

message GetResponse {
  Project project = 1;
}

message Project {
  string display_name = 1;
  string fcm_service_json = 2;
  string id = 3;
  string org_id = 4;
  string private_api_key = 5;
  string public_api_key = 6;
}

message UpdateDisplayNameRequest {
  string display_name = 1 [(buf.validate.field).required = true];
}

message UpdateDisplayNameResponse {
  Project project = 1;
}

message UpdateFCMServiceJSONRequest {
  string fcm_service_json = 1;
}

message UpdateFCMServiceJSONResponse {}
