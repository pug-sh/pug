edition = "2023";
package workers.email.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/pug-sh/pug/internal/gen/proto/workers/email/v1;emailworkerv1";

message EmailJob {
  oneof payload {
    option (buf.validate.oneof).required = true;
    OrgMemberInvitePayload org_member_invite = 3;
    MagicLinkPayload magic_link = 5;
  }
}

message OrgMemberInvitePayload {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  string invitation_id = 2 [(buf.validate.field).required = true];
  string token = 3 [(buf.validate.field).required = true];
}

message MagicLinkPayload {
  string email = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.email = true
  ];
  string token = 2 [(buf.validate.field).required = true];
}
