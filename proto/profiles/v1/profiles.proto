edition = "2023";
package profiles.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/profiles/v1;profilesv1";

service ProfilesService {
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc GetByExternalId(GetByExternalIdRequest) returns (GetByExternalIdResponse) {}
  // todo - shift to server streaming
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Identify(IdentifyRequest) returns (IdentifyResponse) {}
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc Subscribe(SubscribeRequest) returns (SubscribeResponse) {}
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}

message GetByExternalIdRequest {
  string external_id = 1;
}

message GetByExternalIdResponse {
  Profile profile = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Profile profile = 1;
}

message ListRequest {}

message ListResponse {
  repeated Profile profiles = 1;
}

message IdentifyRequest {
  string profile_id = 1 [(buf.validate.field).required = true];
  string external_id = 2 [(buf.validate.field).required = true];
}

message IdentifyResponse {
  Profile profile = 1;
}

message Profile {
  google.protobuf.Struct auto_properties = 1;
  google.protobuf.Timestamp create_time = 2;
  google.protobuf.Struct custom_properties = 3;
  string external_id = 4;
  string id = 5;
  string project_id = 6;
  google.protobuf.Timestamp update_time = 7;
}

message RegisterRequest {
  google.protobuf.Struct auto_properties = 1;
  google.protobuf.Struct custom_properties = 2;
  string external_id = 3 [(buf.validate.field).required = true];
}

message RegisterResponse {}

message SubscribeRequest {
  option (buf.validate.message).cel = {
    id: "subscribe_request.profile_identifier"
    message: "either profile_id or profile_external_id must be provided"
    expression: "this.profile_id != '' || this.profile_external_id != ''"
  };
  string device_id = 1 [(buf.validate.field).string = {len: 20}];
  string platform = 2 [(buf.validate.field).string = {in: ["android", "ios", "web"]}];
  string profile_external_id = 3;
  string profile_id = 4;
  string token = 5 [(buf.validate.field).required = true];
}

message SubscribeResponse {}

enum ProfileOperationType {
  PROFILE_OPERATION_TYPE_UNSPECIFIED = 0;
  PROFILE_OPERATION_TYPE_REGISTER = 1;
}

message ProfileOperationMessage {
  google.protobuf.Struct auto_properties = 1;
  google.protobuf.Struct custom_properties = 2;
  string external_id = 3;
  ProfileOperationType operation_type = 4;
  string project_id = 5;
}
