edition = "2023";
package profiles.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/profiles/v1;profilesv1";

service ProfilesService {
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc GetByExternalId(GetByExternalIdRequest) returns (GetByExternalIdResponse) {}
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Save(SaveRequest) returns (SaveResponse) {}
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}

message GetByExternalIdRequest {
  string external_id = 1;
}

message GetByExternalIdResponse {
  Profile profile = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Profile profile = 1;
}

message ListRequest {}

message ListResponse {
  repeated Profile profiles = 1;
}

message Profile {
  google.protobuf.Struct auto_properties = 1;
  google.protobuf.Timestamp create_time = 2;
  google.protobuf.Struct custom_properties = 3;
  string external_id = 4;
  string id = 5;
  string project_id = 6;
  google.protobuf.Timestamp update_time = 7;
}

message SaveRequest {
  google.protobuf.Struct auto_properties = 1;
  google.protobuf.Struct custom_properties = 2;
  string external_id = 3;
}

message SaveResponse {
  Profile profile = 1;
}
