edition = "2023";
package profiles.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/profiles/v1;profilesv1";

service ProfilesService {
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc GetByExternalId(GetByExternalIdRequest) returns (GetByExternalIdResponse) {}
  rpc List(ListRequest) returns (ListResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc UpdateProperties(UpdatePropertiesRequest) returns (UpdatePropertiesResponse) {}
  rpc UpdateCustomProperties(UpdateCustomPropertiesRequest) returns (UpdateCustomPropertiesResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
}

message Profile {
  string id = 1;
  string external_id = 2;
  string project_id = 3;
  google.protobuf.Struct properties = 4;
  google.protobuf.Struct custom_properties = 5;
  google.protobuf.Timestamp create_time = 6;
  google.protobuf.Timestamp update_time = 7;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Profile profile = 1;
}

message GetByExternalIdRequest {
  string external_id = 1;
}

message GetByExternalIdResponse {
  Profile profile = 1;
}

message ListRequest {}

message ListResponse {
  repeated Profile profiles = 1;
}

message CreateRequest {
  string external_id = 1;
  google.protobuf.Struct properties = 2;
  google.protobuf.Struct custom_properties = 3;
}

message CreateResponse {
  Profile profile = 1;
}

message UpdatePropertiesRequest {
  string id = 1;
  google.protobuf.Struct properties = 2;
}

message UpdatePropertiesResponse {
  Profile profile = 1;
}

message UpdateCustomPropertiesRequest {
  string id = 1;
  google.protobuf.Struct custom_properties = 2;
}

message UpdateCustomPropertiesResponse {
  Profile profile = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}
