edition = "2023";
package campaigns.v1;

option features.field_presence = IMPLICIT;
option go_package = "github.com/fivebitsio/cotton/internal/gen/proto/campaigns/v1;campaignsv1";

import "google/protobuf/timestamp.proto";

service CampaignService {
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteResponse) {}
  rpc Update(UpdateRequest) returns (UpdateResponse) {}
}

/*
   web facing
*/

message BatchGetRequest {}

message BatchGetResponse {
  repeated Campaign campaigns = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Campaign campaign = 1;
}

message CreateRequest {
  string name = 1;
  bytes notification_data = 2;
  google.protobuf.Timestamp scheduled_time = 3;
}

message CreateResponse {
  Campaign campaign = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}

message UpdateRequest {
  string id = 1;
  string name = 2;
  bytes notification_data = 3;
  google.protobuf.Timestamp scheduled_time = 4;
}
message UpdateResponse {
  Campaign campaign = 1;
}

message Campaign {
  google.protobuf.Timestamp create_time = 1;
  google.protobuf.Timestamp end_time = 2;
  string id = 3;
  string name = 4;
  bytes notification_data = 5;
  string project_id = 6;
  google.protobuf.Timestamp scheduled_time = 7;
  google.protobuf.Timestamp start_time = 8;
  string status = 9;
  google.protobuf.Timestamp update_time = 10;
}

/*
   messaging
*/
message CampaignSchedule {
  string id = 1;
}
