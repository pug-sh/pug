services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cotton}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - cotton-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cotton}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsar:
    image: apachepulsar/pulsar:3.2.1
    restart: always
    command: bin/pulsar standalone --wipe-data
    volumes:
      - pulsar-data:/pulsar/data
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ['CMD', 'bin/pulsar-admin', 'brokers', 'healthcheck']
      interval: 30s
      timeout: 10s
      retries: 20
    networks:
      - cotton-net
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=1g"
      PULSAR_PREFIX_brokerDeleteInactiveTopicsEnabled: "false"
      PULSAR_PREFIX_allowAutoTopicCreationType: "partitioned"
      PULSAR_PREFIX_defaultNumPartitions: "1"

  dekaf:
    image: visortelle/dekaf:1.0.0
    restart: always
    environment:
      DEKAF_PULSAR_WEB_URL: "http://pulsar:8080"
      DEKAF_PULSAR_BROKER_URL: "pulsar://pulsar:6650"
    volumes:
      - dekaf-library:/dekaf/data/library
    ports:
      - "8090:8090"
    networks:
      - cotton-net
    depends_on:
      pulsar:
        condition: service_healthy

volumes:
  postgres-data:
  pulsar-data:
  dekaf-library:

networks:
  cotton-net:
    driver: bridge
