services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-pug}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    networks:
      - pug-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pug}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12
    restart: always
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats-jetstream-data:/data
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    networks:
      - pug-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-pug}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_TCP_PORT:-9009}:9009"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - pug-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.36.0
    restart: always
    ports:
      - "${DRAGONFLY_PORT:-6380}:6379"
    volumes:
      - dragonfly-data:/data
    networks:
      - pug-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  nats-jetstream-data:
  clickhouse-data:
  dragonfly-data:

networks:
  pug-net:
    driver: bridge