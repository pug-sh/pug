services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cotton}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - cotton-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cotton}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulsar:
    image: apachepulsar/pulsar:3.2.1
    restart: always
    command: >
      bash -c "
        bin/apply-config-from-env.py conf/standalone.conf &&
        bin/pulsar standalone --no-functions-worker --wipe-data
      "
    volumes:
      - pulsar-data:/pulsar/data
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/metrics/"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - cotton-net
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=1g"
      advertisedAddress: pulsar
      PULSAR_PREFIX_brokerDeleteInactiveTopicsEnabled: "false"
      PULSAR_PREFIX_allowAutoTopicCreationType: "partitioned"
      PULSAR_PREFIX_defaultNumPartitions: "1"
      PULSAR_PREFIX_managedLedgerDefaultEnsembleSize: "1"
      PULSAR_PREFIX_managedLedgerDefaultWriteQuorum: "1"
      PULSAR_PREFIX_managedLedgerDefaultAckQuorum: "1"
      PULSAR_PREFIX_managedLedgerMaxWriteQuorum: "1"
      PULSAR_PREFIX_managedLedgerMaxAckQuorum: "1"

  dekaf:
    image: visortelle/dekaf:1.0.0
    restart: always
    environment:
      DEKAF_PULSAR_WEB_URL: "http://pulsar:8080"
      DEKAF_PULSAR_BROKER_URL: "pulsar://pulsar:6650"
    volumes:
      - dekaf-library:/dekaf/data/library
    ports:
      - "8090:8090"
    networks:
      - cotton-net
    depends_on:
      pulsar:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:23.3
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-cotton}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-default}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_TCP_PORT:-9009}:9009"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - cotton-net

volumes:
  postgres-data:
  pulsar-data:
  dekaf-library:
  clickhouse-data:

networks:
  cotton-net:
    driver: bridge
