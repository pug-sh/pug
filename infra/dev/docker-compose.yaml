services:
  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cotton}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5433}:5432"
    networks:
      - cotton-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cotton}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12
    restart: always
    command: ["--jetstream"]
    volumes:
      - nats-jetstream-data:/data
    ports:
      - "4222:4222"
      - "6222:6222"
      - "8222:8222"
    networks:
      - cotton-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-cotton}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-default}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_TCP_PORT:-9009}:9009"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - cotton-net

volumes:
  postgres-data:
  nats-jetstream-data:
  clickhouse-data:

networks:
  cotton-net:
    driver: bridge
