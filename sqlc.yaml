version: '2'
sql:
  - engine: 'postgresql'
    queries: 'schema/postgres/queries/read/*.sql'
    schema: 'schema/postgres/migrations'
    gen:
      go:
        sql_package: 'pgx/v5'
        out: 'internal/gen/repo/dbread'
        overrides:
          - db_type: "jsonb"
            go_type:
              type: "map[string]any"
          - db_type: "jsonb"
            nullable: true
            go_type:
              type: "map[string]any"
          # thresholds is a JSON array, not an object — return raw bytes so the
          # service layer can marshal proto repeated fields via protojson.
          - column: "dashboard_tiles.thresholds"
            go_type:
              type: "[]byte"
  - engine: 'postgresql'
    queries: 'schema/postgres/queries/write/*.sql'
    schema: 'schema/postgres/migrations'
    gen:
      go:
        sql_package: 'pgx/v5'
        out: 'internal/gen/repo/dbwrite'
        overrides:
          - db_type: "jsonb"
            go_type:
              type: "map[string]any"
          - db_type: "jsonb"
            nullable: true
            go_type:
              type: "map[string]any"
          # thresholds is a JSON array, not an object — return raw bytes so the
          # service layer can marshal proto repeated fields via protojson.
          - column: "dashboard_tiles.thresholds"
            go_type:
              type: "[]byte"
