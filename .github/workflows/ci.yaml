name: CI

on:
  pull_request:
    branches: [main]
    types: [closed]
  push:
    branches: [main]

env:
  GOMODCACHE: /home/runner/go/pkg/mod
  GOCACHE: /home/runner/.cache/go-build

defaults:
  run:
    shell: bash

jobs:
  test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Download modules and compile tools
        run: go mod download && go install tool

      - name: Test
        run: make test

  lint:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Download modules and compile tools
        run: go mod download && go install tool

      - name: Lint
        run: make lint

  drift:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: actions/cache@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Download modules and compile tools
        run: go mod download && go install tool

      - name: Check sqlc drift
        run: make sqlc && git diff --exit-code internal/gen/repo/

      - name: Check protobuf drift
        run: make rpc && git diff --exit-code internal/gen/proto/
