name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

env:
  GOMODCACHE: /home/runner/go/pkg/mod
  GOCACHE: /home/runner/.cache/go-build

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Download modules and compile tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: go mod download && go install tool

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Build
        run: make build

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Test
        run: make test

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Lint
        run: make lint

  drift:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /home/runner/go/pkg/mod
            /home/runner/.cache/go-build
          key: go-${{ hashFiles('go.sum') }}
          restore-keys: go-

      - name: Check sqlc drift
        run: make sqlc && git diff --exit-code internal/gen/repo/

      - name: Check protobuf drift
        run: make rpc && git diff --exit-code internal/gen/proto/
