name: Release

# Releases are deliberate, not every push. Pushing a SemVer tag (vX.Y.Z) builds the
# nine per-role images and pushes them to GHCR (GitHub Container Registry). Plain branch
# pushes never trigger this — they only run CI (ci.yaml).
on:
  push:
    tags:
      - "v*.*.*"

# One release per tag; don't run two builds for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # push images to GHCR via the built-in GITHUB_TOKEN

env:
  # Package-per-role on GHCR under the org: ghcr.io/pug-sh/pug-<name>.
  IMAGE_PREFIX: ghcr.io/pug-sh/pug

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: server,                  cmd: server,                   target: app }
          - { name: worker-events,           cmd: workers/events,           target: worker }
          - { name: worker-email,            cmd: workers/email,            target: worker }
          - { name: worker-profile-identify, cmd: workers/profile/identify, target: worker }
          - { name: worker-profile-alias,    cmd: workers/profile/alias,    target: worker }
          - { name: worker-profile-upsert,   cmd: workers/profile/upsert,   target: worker }
          - { name: migrate-postgres,        cmd: migrate/postgres,         target: migrate }
          - { name: migrate-clickhouse,      cmd: migrate/clickhouse,       target: migrate }
          - { name: migrate-nats,            cmd: migrate/nats,             target: migrate }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          # vX.Y.Z -> :X.Y.Z and :X.Y ; :latest is added automatically for
          # non-prerelease semver tags (flavor latest=auto).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          build-args: |
            CMD=${{ matrix.cmd }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-name cache scope so the nine parallel builds don't clobber each other.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
