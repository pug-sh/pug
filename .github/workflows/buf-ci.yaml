name: Buf CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  delete:

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # buf-action authenticates via its own token inputs (github_token,
          # BUF_TOKEN); it needs no persisted git credentials.
          persist-credentials: false
      - uses: bufbuild/buf-action@v1.4.0
        with:
          # Keep in sync with the buf version pinned in go.mod (go tool buf / make rpc).
          version: 1.71.0
          # We keep proto files hand-aligned (vertical = columns), which buf
          # format flattens, so the format check is disabled. Lint + breaking
          # change detection + BSR push still run.
          format: false
          token: ${{ secrets.BUF_TOKEN }}
